stages:
  - test
  - docs-deploy
  - build-deploy

docs-build-hugo:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: 
        - docs/**/*
        - .gitlab-ci.yml
  stage: docs-deploy
  artifacts:
    paths:
      - docs/public/
  variables:
    HUGO_VERSION: 0.128.1
    TZ: Europe/Berlin
  image: docker.io/library/golang:1.24-bookworm@sha256:10f549dc8489597aa7ed2b62008199bb96717f52a8e8434ea035d5b44368f8a6
  before_script:
    - wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
    - apt install ./hugo_extended_${HUGO_VERSION}_linux-amd64.deb
    - rm -f hugo_extended_${HUGO_VERSION}_linux-amd64.deb
  script:
    - cd docs/
    - hugo --minify --destination ./public

docs-deploy-rsync:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: 
        - docs/**/*
        - .gitlab-ci.yml
  needs:
    - docs-build-hugo
  stage: docs-deploy
  image: docker.io/library/alpine:3.22.0
  variables:
    TARGET_PATH: /webroot/certwarden-deploy.adora.codes
  before_script:
    - apk add --update --no-cache openssh rsync git
    - mkdir -p "$HOME/.ssh"
    - mv "$SSH_KEY_FILE" "$HOME/.ssh/id_ed25519"
    - chmod 0600 "$HOME/.ssh/id_ed25519"
    - ssh-keyscan -t ed25519 -p "$RSYNC_TARGET_PORT" "$RSYNC_TARGET_SERVER" >> "$HOME/.ssh/known_hosts"
  script:
    - rsync -avh -e "ssh -p $RSYNC_TARGET_PORT" --delete ./docs/public/ "$RSYNC_TARGET_USER@$RSYNC_TARGET_SERVER:$TARGET_PATH"

test-mr:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  stage: test
  image: docker.io/library/golang:1.24-bookworm@sha256:10f549dc8489597aa7ed2b62008199bb96717f52a8e8434ea035d5b44368f8a6
  script:
    - make test

build-deploy:
  image: docker.io/library/golang:1.24-bookworm@sha256:10f549dc8489597aa7ed2b62008199bb96717f52a8e8434ea035d5b44368f8a6
  stage: build-deploy
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never
  parallel:
    matrix:
      # Linux x86_64
      - GOOS: linux
        GOARCH: amd64
      # Linux arm64
      - GOOS: "linux"
        GOARCH: "arm64"
      # Linux armv7l
      - GOOS: "linux"
        GOARCH: "arm"
        GOARM: "7"
      # Linux armv7l
      - GOOS: "darwin"
        GOARCH: "arm64"
      # Linux armv7l
      - GOOS: "darwin"
        GOARCH: "amd64"

  variables:
    CGO_ENABLED: "0"
    DEBIAN_FRONTEND: "noninteractive"
    TARGET_PATH: "/webroot/static-cdn.lila.network"
    BIN_PATH: "bin/certwarden-deploy"

  before_script:
    - apt-get update -qq
    - apt-get install -qq openssh-client rsync
    - mkdir -p "$HOME/.ssh"
    - mv "$SSH_KEY_FILE" "$HOME/.ssh/id_ed25519"
    - chmod 0600 "$HOME/.ssh/id_ed25519"
    - ssh-keyscan -t ed25519 -p "$RSYNC_TARGET_PORT" "$RSYNC_TARGET_SERVER" >> "$HOME/.ssh/known_hosts"
    - export RELEASE_PATH="${TARGET_PATH}/releases/${CI_PROJECT_NAME}/${GOOS}/$(helper_scripts/arch_from_goarch.sh)/${CI_COMMIT_TAG}"
    - echo "$RELEASE_PATH"

  script:
    - GOOS=$GOOS GOARCH=$GOARCH make build
    - rsync -avh --rsync-path="mkdir -p ${RELEASE_PATH} && rsync" -e "ssh -p ${RSYNC_TARGET_PORT}" ${BIN_PATH} "${RSYNC_TARGET_USER}@${RSYNC_TARGET_SERVER}:${RELEASE_PATH}/"
